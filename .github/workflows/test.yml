name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        emacs-version: ["28.2", "29.4", "30.1"]
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Show Emacs version
        run: emacs --version | head -1

      - name: Run ERT tests
        run: emacs --batch -Q -l src/emcp-stdio.el -l tests/test-emcp-stdio.el -f ert-run-tests-batch-and-exit

      - name: Server smoke test (initialize + tools/list)
        run: |
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.1"}}}'
          TOOLS='{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'
          OUTPUT=$(printf '%s\n%s\n' "$INIT" "$TOOLS" | timeout 10 emacs --batch -Q -l src/emcp-stdio.el -f emcp-stdio-start 2>/dev/null || true)
          echo "$OUTPUT"
          # Verify we got two JSON-RPC responses
          echo "$OUTPUT" | head -1 | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['result']['protocolVersion']=='2024-11-05', 'bad init'; print('initialize OK')"
          echo "$OUTPUT" | sed -n '2p' | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'tools' in d['result'], 'no tools key'; print('tools/list OK:', len(d['result']['tools']), 'tools')"

      - name: Run integration tests
        if: hashFiles('tests/test_emcp_stdio_integration.sh') != ''
        run: bash tests/test_emcp_stdio_integration.sh
